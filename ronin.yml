x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "3"
      tag: '{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}'

name: ${PROJECT_NAME:-ronin}

services:
  ronin-init:
    restart: "no"
    build:
      context: ./init
      dockerfile: Dockerfile
    image: init:ronin
    pull_policy: never
    environment:
      - DATADIR=/data
      - NETWORK=${NETWORK:-ronin}
      - SNAPSHOT=${SNAPSHOT:-}
      - UPDATE_BEDROCK_BLOCK=${UPDATE_BEDROCK_BLOCK:-true}
    volumes:
      - data:/data
      - /etc/localtime:/etc/localtime:ro

  ronin-execution:
    restart: "unless-stopped"
    build:
      context: ./node/reth
      dockerfile: Dockerfile
      args:
        RETH_DOCKER_TAG: ${RETH_DOCKER_TAG:-v1.0.0-rc.1}
    image: ronin-reth:${RETH_DOCKER_TAG:-v1.0.0-rc.1}
    stop_grace_period: 5m
    environment:
      - RETH_SEQUENCER_URL=${RETH_SEQUENCER_URL}
      - RETH_HISTORICAL_RPC=${RETH_HISTORICAL_RPC:-}
    volumes:
      - data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -fsS -H 'content-type: application/json' \
            --data '{"jsonrpc":"2.0","id":1,"method":"eth_chainId","params":[]}' \
            http://127.0.0.1:8545 | jq -e '.result == "${EXPECTED_CHAIN_ID:-0x7e4}"' >/dev/null
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      ronin-init:
        condition: service_completed_successfully
    <<: *logging

  ronin-eigenda-proxy:
    restart: "unless-stopped"
    image: ghcr.io/layr-labs/eigenda-proxy:${EIGENDA_PROXY_VERSION:-2.7.0}
    platform: linux/amd64
    environment:
      - EIGENDA_PROXY_EIGENDA_V2_NETWORK=${EIGENDA_PROXY_EIGENDA_V2_NETWORK}
      - EIGENDA_PROXY_EIGENDA_V2_CERT_VERIFIER_ROUTER_OR_IMMUTABLE_VERIFIER_ADDR=${EIGENDA_PROXY_EIGENDA_V2_CERT_VERIFIER_ROUTER_OR_IMMUTABLE_VERIFIER_ADDR}
      - EIGENDA_PROXY_STORAGE_BACKENDS_TO_ENABLE=${EIGENDA_PROXY_STORAGE_BACKENDS_TO_ENABLE}
      - EIGENDA_PROXY_STORAGE_DISPERSAL_BACKEND=${EIGENDA_PROXY_STORAGE_DISPERSAL_BACKEND}
      - EIGENDA_PROXY_EIGENDA_V2_DISPERSER_RPC=${EIGENDA_PROXY_EIGENDA_V2_DISPERSER_RPC}
      - EIGENDA_PROXY_EIGENDA_V2_ETH_RPC=${OP_NODE_L1_ETH_RPC}
      - EIGENDA_PROXY_APIS_TO_ENABLE=op-generic,metrics
    command:
      - --addr=0.0.0.0
      - --port=3100
    <<: *logging

  ronin-op-node:
    restart: "unless-stopped"
    build:
      context: ./node/op-node
      dockerfile: Dockerfile
      args:
        OP_NODE_DOCKER_TAG: ${OP_NODE_DOCKER_TAG:-v1.16.5}
    image: ronin-op-node:${OP_NODE_DOCKER_TAG:-v1.16.5}
    depends_on:
      ronin-init:
        condition: service_completed_successfully
      ronin-execution:
        condition: service_healthy
      ronin-eigenda-proxy:
        condition: service_started
    environment:
      - NETWORK=${NETWORK:-ronin}
      - OP_NODE_P2P_STATIC=${OP_NODE_P2P_STATIC}
      - OP_NODE_P2P_SYNC_ONLYREQTOSTATIC=${OP_NODE_P2P_SYNC_ONLYREQTOSTATIC:-true}
    command:
      - --l1=${OP_NODE_L1_ETH_RPC}
      - --l2=http://ronin-execution:9551
      - --l2.jwt-secret=/data/jwt.hex
      - --rpc.addr=0.0.0.0
      - --rpc.port=${OP_NODE_RPC_PORT:-7545}
      - --l1.beacon=${OP_NODE_L1_BEACON}
      - --p2p.listen.ip=0.0.0.0
      - --p2p.listen.tcp=9222
      - --p2p.listen.udp=9222
      - --rpc.enable-admin
      - --metrics.enabled
      - --metrics.addr=0.0.0.0
      - --metrics.port=7300
      - --sequencer.enabled=false
      - --verifier.l1-confs=4
      - --altda.enabled=true
      - --altda.da-server=${OP_NODE_ALTDA_DA_SERVER:-http://ronin-eigenda-proxy:3100}
    volumes:
      - data:/data:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -fsS -H 'content-type: application/json' \
            --data '{"jsonrpc":"2.0","id":1,"method":"optimism_syncStatus","params":[]}' \
            http://127.0.0.1:${OP_NODE_RPC_PORT:-7545} | jq -e '.result.unsafe_l2.number >= 0' >/dev/null
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - ${OP_NODE_P2P_PORT:-9222}:9222/tcp
      - ${OP_NODE_P2P_PORT:-9222}:9222/udp
    <<: *logging

volumes:
  data: {}
